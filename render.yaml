services:
  - type: web
    name: energy-forecaster-api
    env: python
    buildCommand: "pip install -r requirements.txt && python generate_data.py && python train_model.py"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
